# CORR-WATCH MVP - Configuração Forex & Índices
# Foco em Correlações Globais

system:
  name: "CORR-WATCH"
  version: "2.1"
  update_interval_seconds: 300
  log_level: "INFO"

pairs:
  # =========================
  # POSITIVOS
  # =========================
  - symbol_a: "EURUSD=X"
    symbol_b: "GBPUSD=X"
    expected_correlation: 0.85
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 1

  - symbol_a: "AUDUSD=X"
    symbol_b: "NZDUSD=X"
    expected_correlation: 0.80
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 2

  - symbol_a: "^GSPC"
    symbol_b: "^IXIC"
    expected_correlation: 0.90
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 3

  - symbol_a: "^GSPC"
    symbol_b: "^DJI"
    expected_correlation: 0.85
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 4

  - symbol_a: "^IXIC"
    symbol_b: "^DJI"
    expected_correlation: 0.82
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 5

  - symbol_a: "^GDAXI"
    symbol_b: "^FTSE"
    expected_correlation: 0.80
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 6

  - symbol_a: "USDJPY=X"
    symbol_b: "^N225"
    expected_correlation: 0.70
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 7

  # =========================
  # NEGATIVOS
  # =========================
  - symbol_a: "EURUSD=X"
    symbol_b: "USDCHF=X"
    expected_correlation: -0.80
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 8

  - symbol_a: "GBPUSD=X"
    symbol_b: "USDCHF=X"
    expected_correlation: -0.75
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 9

  - symbol_a: "^GSPC"
    symbol_b: "^VIX"
    expected_correlation: -0.85
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 10

  - symbol_a: "^IXIC"
    symbol_b: "^VIX"
    expected_correlation: -0.80
    source_a: "yfinance"
    source_b: "yfinance"
    priority: 11

# Parâmetros
window: 50
z_threshold: 2.0
update_interval: 300
timeframe: "1h"

# Thresholds
thresholds:
  z_score_alert: 2.0
  z_score_critical: 2.5
  z_score_anomaly: 3.0
  correlation_deviation_alert: 0.20
  correlation_deviation_critical: 0.30
  delta_correlation_alert: 0.15
  delta_correlation_critical: 0.25
  cointegration_pvalue_max: 0.10
  halflife_max_periods: 100
  min_volume_ratio: 0.80
  min_score_for_alert: 60
  min_quality_score: 75

# Alertas
alerts:
  cooldown_seconds: 300
  max_simultaneous: 15
  notification_channels:
    - "console"
    - "log"
    - "dashboard"
